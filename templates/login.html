<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsukuri - Login</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='webicon.ico') }}">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #000; --s1: #0f0f0f; --s2: #181818; --s3: #222;
            --border: rgba(255,255,255,.08); --white: #fff; --black: #000;
            --text: #f0f0f0; --muted: #555;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Tightened logo margin */
        .logo-img { width: 340px; max-width: 90%; margin-bottom: 1.5rem; }

        .login-container {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-login-initial {
            padding: 0.8rem 3rem;
            background: transparent;
            color: var(--white);
            border: 1.5px solid var(--white);
            border-radius: 999px;
            font-size: 1rem;
            letter-spacing: 0.18em;
            cursor: pointer;
            transition: all 0.22s;
        }

        .login-form {
            display: none;
            flex-direction: column;
            gap: 1rem; /* Tightened gap */
            width: 100%;
            animation: fadeUp 0.3s ease forwards;
        }

        .login-form.visible { display: flex; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }

        .form-group input {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: var(--white);
            font-size: 16px; 
            width: 100%;
        }

        .form-actions { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.2rem; }

        .btn-submit {
            padding: 12px;
            background: var(--white);
            color: var(--black);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            padding: 10px;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <img src="{{ url_for('static', filename='logo.png') }}" alt="Tsukuri Logo" class="logo-img">

    <div class="login-container">
        <div id="buttonWrapper">
            <button class="btn-login-initial" onclick="showLoginForm()">LOGIN</button>
        </div>
        
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-submit">Sign In</button>
                <button type="button" class="btn-cancel" onclick="hideLoginForm()">Cancel</button>
            </div>
        </form>
    </div>
        
    <script>
        function showLoginForm() {
            document.getElementById('buttonWrapper').style.display = 'none';
            document.getElementById('loginForm').classList.add('visible');
            document.getElementById('username').focus();
        }

        function hideLoginForm() {
            document.getElementById('loginForm').classList.remove('visible');
            document.getElementById('buttonWrapper').style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    window.location.href = '/progress';
                } else {
                    alert(result.message || "Login failed");
                }
            } catch (error) {
                alert('Could not connect to server.');
            }
        });
    </script>
</body>
</html>
